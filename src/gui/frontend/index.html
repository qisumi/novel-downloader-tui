<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novel Downloader</title>
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">ND</div>
        <div>
          <div class="eyebrow">GUI Client</div>
          <h1>小说下载器</h1>
        </div>
      </div>

      <nav class="nav-menu">
        <button class="nav-item active" data-target="search-page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          发现与搜索
        </button>
        <button class="nav-item" data-target="bookshelf-page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          我的书架
        </button>
        <button class="nav-item" data-target="tasks-page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
          活动任务
        </button>
      </nav>

      <section class="panel" style="margin-top: auto; margin-bottom: 0;">
        <label class="label" for="source-select">当前书源</label>
        <div style="display: flex; gap: 8px;">
          <select id="source-select" style="flex: 1; padding: 8px; font-size: 0.9em;"></select>
          <button id="refresh-sources" class="ghost-button" type="button" title="刷新书源" style="padding: 8px; width: 36px; display: flex; justify-content: center; align-items: center;">⟳</button>
        </div>
      </section>

      <div class="sidebar-status">
        <div id="status-line" class="status-line" style="background: transparent; padding: 0; box-shadow: none;">准备就绪</div>
      </div>
    </aside>

    <main class="content-container">
      
      <!-- 搜索页 -->
      <div id="search-page" class="page-view active">
        <section class="hero">
          <div>
            <div class="eyebrow">探索无限资源</div>
            <h2>发现你想看的小说</h2>
            <p>强大的书源插件系统，支持全站小说检索，一键缓存整本，快速导出为通用 EPUB、TXT 电子书格式供离线阅读。</p>
          </div>
        </section>

        <section class="card search-card">
          <form id="search-form" class="search-bar">
            <input id="search-input" type="search" placeholder="输入你想看的小说、作者名..." autofocus>
            <button type="submit">立即搜索</button>
          </form>
          <div id="search-results" class="results-grid">
            <div class="empty-state" style="grid-column: 1 / -1;">请输入关键词开始搜索书籍</div>
          </div>
        </section>
      </div>

      <!-- 书架页 -->
      <div id="bookshelf-page" class="page-view">
        <div class="section-head" style="margin-bottom: 24px; padding-bottom: 16px;">
          <h3>我的书架</h3>
          <span style="color: var(--muted); font-size: 0.9rem;">已收藏的书籍将在这里显示</span>
        </div>
        <div id="bookshelf-list" class="results-grid" style="margin-top: 0;">
          <div class="empty-state" style="grid-column: 1 / -1;">书架还是空的，去搜索并添加一些书吧</div>
        </div>
      </div>

      <!-- 任务页 -->
      <div id="tasks-page" class="page-view">
        <div class="section-head" style="margin-bottom: 24px; padding-bottom: 16px;">
          <h3>活动任务</h3>
          <span style="color: var(--muted); font-size: 0.9rem;">缓存与导出进度</span>
        </div>
        <div id="task-feed" class="stack" style="max-width: 800px;">
           <div class="empty-state" style="padding: 24px;">当前没有进行中的任务</div>
        </div>
      </div>

      <!-- 书籍详情二级页 -->
      <div id="detail-page" class="page-view detail-main-layout">
        <div class="back-header">
          <button id="back-button" class="ghost-button back-button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回
          </button>
          <span style="color: var(--muted); font-size: 0.9rem;">书籍详情</span>
        </div>

        <div class="detail-grid">
          <!-- 左侧边栏列 (纯书籍档案) -->
          <div class="detail-left-column">
            <section class="card detail-card" style="height: 100%; display: flex; flex-direction: column;">
              <div class="section-head">
                <h3>书籍档案</h3>
                <div class="action-row">
                  <button id="save-bookshelf" class="ghost-button" type="button">加入书架</button>
                  <button id="remove-bookshelf" class="ghost-button" type="button" style="display: none;">移出书架</button>
                </div>
              </div>
              <div id="book-detail" class="book-detail" style="flex: 1;">
                <!-- 动态填充 -->
              </div>
            </section>
          </div>

          <!-- 右侧边栏列 (全高章节目录 + 导出) -->
          <section class="card toc-card">
            <div class="section-head">
              <div style="display: flex; flex-direction: column; gap: 4px;">
                <h3>章节目录</h3>
                <div id="toc-summary" style="color: var(--brand); font-size: 0.85rem; font-weight: 500;">加载中...</div>
              </div>
              <div class="action-row">
                <button id="reload-toc" class="ghost-button" type="button" title="刷新最新章节">刷新</button>
                <button id="download-book" type="button">一键缓存</button>
              </div>
            </div>

            <!-- 右侧导出模块嵌入目录上方 -->
            <div class="export-bar" style="margin-bottom: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; background: rgba(251, 235, 220, 0.4);">
                <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
                    <label style="font-size: 0.85rem; white-space: nowrap;">从 <input id="export-start" type="number" min="1" value="1" style="width: 70px; padding: 6px;"></label>
                    <span style="color: var(--muted);">-</span>
                    <label style="font-size: 0.85rem; white-space: nowrap;">至 <input id="export-end" type="number" min="1" value="1" style="width: 70px; padding: 6px;"></label>
                    <select id="export-format" style="width: 80px; padding: 6px; font-size: 0.85rem; margin-left: auto;">
                        <option value="epub">EPUB</option>
                        <option value="txt">TXT</option>
                    </select>
                </div>
                <button id="export-book" type="button" style="padding: 8px 16px; font-size: 0.9rem; white-space: nowrap;">导出目录内章节</button>
            </div>
            <!-- 隐藏的旧导出路径显示为了兼容JS，或者用细小文字提示 -->
            <div style="font-size: 0.75rem; color: var(--muted); margin-top: -8px; margin-bottom: 12px; text-align: right; display: none;">上次导出目录: <span id="exports-dir">暂无</span></div>

            <div id="toc-list" class="toc-list">
              <div class="empty-state">正在加载目录数据...</div>
            </div>
          </section>
        </div>
      </div>

    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
