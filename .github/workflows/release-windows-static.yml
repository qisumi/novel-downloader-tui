name: Release Windows Static

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup Visual Studio developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: cmake --preset windows-x64-release-static-msvc
        shell: pwsh

      - name: Build
        run: cmake --build --preset windows-x64-release-static-msvc --clean-first
        shell: pwsh

      - name: Prepare package
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $package_name = "fanqie-downloader-tui-$tag-windows-static"
          $staging_dir = Join-Path $env:RUNNER_TEMP $package_name
          New-Item -ItemType Directory -Path $staging_dir -Force | Out-Null

          Copy-Item ".\build\release-static-msvc\fanqie-downloader-tui.exe" $staging_dir
          Copy-Item ".\build\release-static-msvc\plugins" -Destination $staging_dir -Recurse
          Copy-Item ".\README.md" $staging_dir
          Copy-Item ".\.env.example" $staging_dir

          $archive = Join-Path $env:RUNNER_TEMP "$package_name.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }

          Compress-Archive -Path (Join-Path $staging_dir '*') -DestinationPath $archive
          "ASSET_PATH=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
