name: Release Windows Static

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      BUILD_DIR: ${{ github.workspace }}\build\release-static-msvc
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      PACKAGE_TAG: ""
      ASSET_PATH: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', env.RELEASE_TAG) || github.ref }}

      - name: Setup Visual Studio developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Resolve package metadata
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -or "${{ github.ref }}" -like "refs/tags/*") {
            $package_tag = "${{ env.RELEASE_TAG }}"
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            $package_tag = "pr-${{ github.event.pull_request.number }}"
          } else {
            $package_tag = "${{ github.ref_name }}"
          }

          $package_tag = $package_tag -replace '[^0-9A-Za-z._-]', '-'
          "PACKAGE_TAG=$package_tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B "$env:BUILD_DIR"
          -G "Visual Studio 17 2022"
          -A x64
          -D CMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
          -D NOVEL_ENABLE_WEBVIEW_GUI=ON
          -D VCPKG_TARGET_TRIPLET="$env:VCPKG_DEFAULT_TRIPLET"

      - name: Build
        run: >
          cmake --build "$env:BUILD_DIR"
          --config "$env:BUILD_TYPE"
          --target novel-downloader-gui
          --clean-first
        shell: pwsh

      - name: Prepare package
        shell: pwsh
        run: |
          $package_name = "novel-downloader-gui-$env:PACKAGE_TAG-windows-x64-static"
          $staging_dir = Join-Path $env:RUNNER_TEMP $package_name
          $output_dir = Join-Path $env:BUILD_DIR "bin\$env:BUILD_TYPE"
          New-Item -ItemType Directory -Path $staging_dir -Force | Out-Null

          Copy-Item (Join-Path $output_dir "novel-downloader-gui.exe") $staging_dir
          Copy-Item (Join-Path $output_dir "gui") -Destination $staging_dir -Recurse
          Copy-Item (Join-Path $output_dir "plugins") -Destination $staging_dir -Recurse
          Copy-Item ".\README.md" $staging_dir
          Copy-Item ".\.env.example" $staging_dir

          $archive = Join-Path $env:RUNNER_TEMP "$package_name.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }

          Compress-Archive -Path (Join-Path $staging_dir '*') -DestinationPath $archive
          "ASSET_PATH=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('novel-downloader-gui-{0}-windows-x64-static', env.PACKAGE_TAG) }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: Publish release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
